<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Arama Sonuçları - EstateFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Arama Sonuçları</h1>
            <p class="text-muted mb-0">Müşteri kriterlerine uygun emlak listesi</p>
        </div>
        <a th:href="@{/search/view}" class="btn btn-outline-dark">Yeni Arama</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(results)}" class="alert alert-warning m-3">
                Uygun emlak bulunamadı.
            </div>

            <div th:if="${!#lists.isEmpty(results)}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-3">#</th>
                        <th class="px-3">Başlık</th>
                        <th class="px-3">Şehir</th>
                        <th class="px-3">İlçe</th>
                        <th class="px-3">Metrekare</th>
                        <th class="px-3">Oda Sayısı</th>
                        <th class="px-3">Isınma</th>
                        <th class="px-3">Eşyalı</th>
                        <th class="px-3">Fiyat</th>
                        <th class="px-3">Sahibi</th>
                        <th class="px-3">Yazdır</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="property, stat: ${results}">
                        <td class="px-3" th:text="${stat.count}">1</td>
                        <td class="px-3" th:text="${property.title}">Kiralık 2+1 Daire</td>
                        <td class="px-3" th:text="${property.city}">Ankara</td>
                        <td class="px-3" th:text="${property.district}">Çankaya</td>
                        <td class="px-3" th:text="${property.squareMeters}">95</td>
                        <td class="px-3" th:text="${property.roomCount}">2</td>
                        <td class="px-3" th:text="${property.heatingType.label}">Doğal Gaz</td>
                        <td class="px-3" th:text="${property.furnished ? 'Evet' : 'Hayır'}">Hayır</td>
                        <td class="px-3" th:text="${@priceFormatter.formatTL(property.price)}"></td>
                        <td class="px-3" th:text="${property.ownerFullName}">Esra Yılmaz</td>
                        <td class="px-3">
                            <a th:href="@{'/properties/view/print/' + ${property.id}}"
                               class="btn btn-sm btn-outline-dark">Yazdır</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer-scripts}"></div>
</body>
</html>
