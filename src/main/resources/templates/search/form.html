<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Emlak Arama - EstateFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="mb-4">
        <h1 class="fw-bold">Emlak Arama</h1>
        <p class="text-muted mb-0">Müşteri kriterlerine göre uygun emlakları bulun</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="@{/search/view}" th:object="${searchRequest}" method="post">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">İlan Sahibi</label>
                        <select class="form-select" th:field="*{customerId}">
                            <option value="">Hepsi</option>
                            <option th:each="customer : ${customers}"
                                    th:value="${customer.id}"
                                    th:text="${customer.firstName + ' ' + customer.lastName}">
                            </option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('customerId')}"
                             th:errors="*{customerId}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Şehir</label>
                        <input type="text" class="form-control" th:field="*{city}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">İlçe</label>
                        <input type="text" class="form-control" th:field="*{district}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Minimum Metrekare</label>
                        <input type="number" class="form-control" th:field="*{minSquareMeters}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Maksimum Fiyat</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{maxPrice}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Minimum Oda Sayısı</label>
                        <input type="number" class="form-control" th:field="*{minRoomCount}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">İlan Türü</label>
                        <select class="form-select" th:field="*{listingType}">
                            <option value="">Seçin</option>
                            <option th:each="type : ${listingTypes}"
                                    th:value="${type}"
                                    th:text="${type.label}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Emlak Türü</label>
                        <select class="form-select" th:field="*{propertyType}">
                            <option value="">Seçin</option>
                            <option th:each="type : ${propertyTypes}"
                                    th:value="${type}"
                                    th:text="${type.label}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Isınma Türü</label>
                        <select class="form-select" th:field="*{heatingType}">
                            <option value="">Seçin</option>
                            <option th:each="type : ${heatingTypes}"
                                    th:value="${type}"
                                    th:text="${type.label}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Eşya Durumu</label>
                        <select class="form-select" th:field="*{furnished}">
                            <option value="">Hepsi</option>
                            <option value="true">Eşyalı</option>
                            <option value="false">Eşyasız</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-dark">Emlak Ara</button>
                    </div>

                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer-scripts}"></div>
</body>
</html>
