<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Emlaklar - EstateFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Emlaklar</h1>
            <p class="text-muted mb-0">Sistemde kayıtlı emlak listesi</p>
        </div>
        <a th:href="@{/properties/view/new}" class="btn btn-dark">Yeni Emlak</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(properties)}" class="alert alert-warning m-3">
                Kayıtlı emlak bulunamadı.
            </div>

            <div th:if="${!#lists.isEmpty(properties)}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-3">#</th>
                        <th class="px-3">Başlık</th>
                        <th class="px-3">Şehir</th>
                        <th class="px-3">İlçe</th>
                        <th class="px-3">İlan Türü</th>
                        <th class="px-3">Emlak Türü</th>
                        <th class="px-3">Fiyat</th>
                        <th class="px-3">Durum</th>
                        <th class="px-3">Sahibi</th>
                        <th class="px-3">İşlemler</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="property, stat :  ${properties}">
                        <td class="px-3" th:text="${stat.count}">1</td>
                        <td class="px-3" th:text="${property.title}">Kiralık 2+1 Daire</td>
                        <td class="px-3" th:text="${property.city}">Ankara</td>
                        <td class="px-3" th:text="${property.district}">Çankaya</td>
                        <td class="px-3" th:text="${property.listingType.label}">Kiralık</td>
                        <td class="px-3" th:text="${property.propertyType.label}">Daire</td>
                        <td class="px-3" th:text="${@priceFormatter.formatTL(property.price)}"></td>
                        <td class="px-3" th:text="${property.status.label}">Aktif</td>
                        <td class="px-3" th:text="${property.ownerFullName}">Esra Yılmaz</td>
                        <td class="px-3">
                            <div class="d-flex gap-2">
                                <a th:href="@{'/properties/view/edit/' + ${property.id}}"
                                   class="btn btn-sm btn-outline-primary">Düzenle</a>
                                <a th:href="@{'/properties/view/print/' + ${property.id}}"
                                   class="btn btn-sm btn-outline-dark">Yazdır</a>
                                <a th:href="@{'/properties/view/delete/' + ${property.id}}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Bu emlak kaydını silmek istediğinize emin misiniz?')">Sil</a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer-scripts}"></div>
</body>
</html>
