<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Emlak Formu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="mb-4">
        <h1 class="fw-bold" th:text="${formTitle}">Emlak Formu</h1>
        <p class="text-muted mb-0">Emlak bilgisi ekleyin veya güncelleyin</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="${formAction}" th:object="${propertyForm}" method="post">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Başlık</label>
                        <input type="text" class="form-control" th:field="*{title}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('title')}"
                             th:errors="*{title}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Müşteri Sahibi</label>
                        <select class="form-select" th:field="*{ownerCustomerId}">
                            <option value="">Müşteri Seçin</option>
                            <option th:each="customer : ${customers}"
                                    th:value="${customer.id}"
                                    th:text="${customer.firstName + ' ' + customer.lastName}">
                            </option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('ownerCustomerId')}"
                             th:errors="*{ownerCustomerId}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">İlan Türü</label>
                        <select class="form-select" th:field="*{listingType}">
                            <option value="">Seçin</option>
                            <option th:each="type : ${listingTypes}" th:value="${type}" th:text="${type.label}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Emlak Türü</label>
                        <select class="form-select" th:field="*{propertyType}">
                            <option value="">Seçin</option>
                            <option th:each="type : ${propertyTypes}" th:value="${type}" th:text="${type.label}"></option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('propertyType')}"
                             th:errors="*{propertyType}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Şehir</label>
                        <input type="text" class="form-control" th:field="*{city}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('city')}"
                             th:errors="*{city}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">İlçe</label>
                        <input type="text" class="form-control" th:field="*{district}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('district')}"
                             th:errors="*{district}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Adres</label>
                        <input type="text" class="form-control" th:field="*{address}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Metrekare</label>
                        <input type="number" class="form-control" th:field="*{squareMeters}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('squareMeters')}"
                             th:errors="*{squareMeters}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Oda Sayısı</label>
                        <input type="number" class="form-control" th:field="*{roomCount}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('roomCount')}"
                             th:errors="*{roomCount}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Kat</label>
                        <input type="number" class="form-control" th:field="*{floorNumber}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Bina Katı</label>
                        <input type="number" class="form-control" th:field="*{buildingFloors}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Isınma Türü</label>
                        <select class="form-select" th:field="*{heatingType}">
                            <option value="">Seçin</option>
                            <option th:each="type : ${heatingTypes}" th:value="${type}" th:text="${type.label}"></option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('heatingType')}"
                             th:errors="*{heatingType}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Durum</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="">Seçin</option>
                            <option th:each="type : ${propertyStatuses}" th:value="${type}" th:text="${type.label}"></option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('status')}"
                             th:errors="*{status}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Fiyat</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('price')}"
                             th:errors="*{price}">
                        </div>
                    </div>

                    <div class="col-md-6 d-flex align-items-center">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" th:field="*{furnished}">
                            <label class="form-check-label">Eşyalı</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Açıklama</label>
                        <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-dark">Kaydet</button>
                        <a th:href="@{/properties/view}" class="btn btn-outline-secondary">İptal</a>
                    </div>

                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer-scripts}"></div>
</body>
</html>
