<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Müşteriler - EstateFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Müşteriler</h1>
            <p class="text-muted mb-0">Sistemde kayıtlı müşteri listesi</p>
        </div>
        <a th:href="@{/customers/view/new}" class="btn btn-dark">Yeni Müşteri</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(customers)}" class="alert alert-warning m-3">
                Kayıtlı Müşteri Bulunamadı.
            </div>

            <div th:if="${!#lists.isEmpty(customers)}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-3">#</th>
                        <th class="px-3">Ad</th>
                        <th class="px-3">Soyad</th>
                        <th class="px-3">Cep Telefonu</th>
                        <th class="px-3">E-posta</th>
                        <th class="px-3">Müşteri Tipi</th>
                        <th class="px-3">İşlemler</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="customer,stat : ${customers}">
                        <td class="px-3" th:text="${stat.count}">1</td>
                        <td class="px-3" th:text="${customer.firstName}">Esra</td>
                        <td class="px-3" th:text="${customer.lastName}">Yılmaz</td>
                        <td class="px-3" th:text="${customer.mobilePhone}">05550000000</td>
                        <td class="px-3" th:text="${customer.email}">esra@example.com</td>
                        <td class="px-3" th:text="${customer.customerType.label}">Satıcı</td>
                        <td class="px-3">
                            <div class="d-flex gap-2">
                                <a th:href="@{'/customers/view/edit/' + ${customer.id}}"
                                   class="btn btn-sm btn-outline-primary">
                                    Düzenle
                                </a>
                                <a th:href="@{'/customers/view/delete/' + ${customer.id}}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Bu müşteriyi silmek istediğinize emin misiniz?')">
                                    Sil
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer-scripts}"></div>
</body>
</html>
