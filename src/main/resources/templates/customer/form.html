<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Müşteri Formu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="mb-4">
        <h1 class="fw-bold" th:text="${formTitle}">Müşteri Formu</h1>
        <p class="text-muted mb-0">Müşteri bilgisi ekleyin veya güncelleyin</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="${formAction}" th:object="${customerForm}" method="post">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Ad</label>
                        <input type="text" class="form-control" th:field="*{firstName}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('firstName')}"
                             th:errors="*{firstName}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Soyad</label>
                        <input type="text" class="form-control" th:field="*{lastName}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('lastName')}"
                             th:errors="*{lastName}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Ev Telefonu</label>
                        <input type="text" class="form-control" th:field="*{homePhone}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('homePhone')}"
                             th:errors="*{homePhone}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Cep Telefonu</label>
                        <input type="text" class="form-control" th:field="*{mobilePhone}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('mobilePhone')}"
                             th:errors="*{mobilePhone}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">E-posta</label>
                        <input type="email" class="form-control" th:field="*{email}">
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('email')}"
                             th:errors="*{email}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Müşteri Tipi</label>
                        <select class="form-select" th:field="*{customerType}">
                            <option value="">Müşteri Tipi Seçin</option>
                            <option th:each="type : ${customerTypes}"
                                    th:value="${type}"
                                    th:text="${type.label}">
                            </option>
                        </select>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('customerType')}"
                             th:errors="*{customerType}">
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Notlar</label>
                        <textarea class="form-control" rows="4" th:field="*{notes}"></textarea>
                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('notes')}"
                             th:errors="*{notes}">
                        </div>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-dark">Kaydet</button>
                        <a th:href="@{/customers/view}" class="btn btn-outline-secondary">İptal</a>
                    </div>

                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer-scripts}"></div>
</body>
</html>
