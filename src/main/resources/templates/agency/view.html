<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ofis Bilgileri - EstateFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="mb-4">
        <h1 class="fw-bold">Ofis Bilgileri</h1>
        <p class="text-muted mb-0">Emlak Ofisine Ait Temel Bilgiler</p>
        <a th:href="@{/agency/view/edit}" class="btn btn-dark">Düzenle</a>
    </div>

    <div class="card shadow-sm border-0" th:if="${agency != null}">
        <div class="card-body">
            <div class="row g-4">
                <div class="col-md-6">
                    <h6 class="text-muted">İşletme Adı</h6>
                    <p class="fs-5 fw-semibold mb-0" th:text="${agency.businessName}">Esra Emlak</p>
                </div>

                <div class="col-md-6">
                    <h6 class="text-muted">Yetkili Kişi</h6>
                    <p class="fs-5 fw-semibold mb-0" th:text="${agency.authorizedPerson}">Esra Yılmaz</p>
                </div>

                <div class="col-md-6">
                    <h6 class="text-muted">Telefon</h6>
                    <p class="mb-0" th:text="${agency.phone}">03120000000</p>
                </div>

                <div class="col-md-6">
                    <h6 class="text-muted">Fax</h6>
                    <p class="mb-0" th:text="${agency.fax}">03120000001</p>
                </div>

                <div class="col-12">
                    <h6 class="text-muted">Adres</h6>
                    <p class="mb-0" th:text="${agency.address}">Ankara, Türkiye</p>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-warning" th:if="${agency == null}">
        Ofis Bilgisi Bulunamadı.
    </div>
</div>
<div th:replace="~{fragments/footer :: footer-scripts}"></div>
</body>
</html>
